<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN Fashion Villa - Contact</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">AN Fashion Villa</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </div>
        </nav>
    </header>

    <section class="contact-section">
        <div class="container">
            <h2>Contact Us</h2>
            <div class="contact-container">
                <div class="contact-info">
                    <h3>Get In Touch</h3>
                    <p>📧 contact@anfashionvilla.com</p>
                    <p>📞 +92 300 1234567</p>
                    <p>📍 Sargodha, Punjab, Pakistan</p>
                    <div class="social-links">
                        <a href="#">Facebook</a>
                        <a href="#">Instagram</a>
                        <a href="#">WhatsApp</a>
                    </div>
                </div>
                <form class="contact-form" id="contact-form">
                    <div class="form-group"><label>Name *</label><input type="text" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" required></div>
                    <div class="form-group"><label>Subject *</label><input type="text" required></div>
                    <div class="form-group"><label>Message *</label><textarea required rows="5"></textarea></div>
                    <button type="submit" class="btn btn-large">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="copyright">© 2026 AN Fashion Villa. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
