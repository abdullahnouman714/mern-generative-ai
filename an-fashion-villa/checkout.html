<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN Fashion Villa - Checkout</title>
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">AN Fashion Villa</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </div>
        </nav>
    </header>

    <section class="checkout-section">
        <div class="container">
            <h2>Checkout</h2>
            <div class="checkout-container">
                <form class="checkout-form" id="checkout-form">
                    <h3>Billing Details</h3>
                    <div class="form-group"><label>Full Name *</label><input type="text" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" required></div>
                    <div class="form-group"><label>Phone *</label><input type="tel" required></div>
                    <div class="form-group"><label>Address *</label><textarea required rows="3"></textarea></div>
                    <div class="form-group"><label>City *</label><input type="text" required></div>
                    <h3>Payment Method</h3>
                    <div class="payment-options">
                        <label><input type="radio" name="payment" value="cod" checked>Cash on Delivery</label>
                        <label><input type="radio" name="payment" value="card">Credit/Debit Card</label>
                        <label><input type="radio" name="payment" value="jazzcash">JazzCash</label>
                    </div>
                    <button type="submit" class="btn btn-large">Place Order</button>
                </form>
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div id="checkout-items"></div>
                    <div class="summary-row total"><span>Total:</span><span id="checkout-total">PKR 0</span></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="copyright">© 2026 AN Fashion Villa. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
