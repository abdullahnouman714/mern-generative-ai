<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN Fashion Villa - Product</title>
    <link rel="stylesheet" href="css/product.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">AN Fashion Villa</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </div>
        </nav>
    </header>

    <section class="product-detail-section">
        <div class="container">
            <div class="product-detail">
                <div class="product-images">
                    <img src="" alt="Product" id="main-image">
                </div>
                <div class="product-info">
                    <h1 id="product-name">Loading...</h1>
                    <p class="price" id="product-price">PKR 0</p>
                    <p class="description" id="product-description">Loading...</p>
                    <div class="product-options">
                        <label>Size:</label>
                        <select id="product-size">
                            <option value="S">Small</option>
                            <option value="M">Medium</option>
                            <option value="L">Large</option>
                            <option value="XL">Extra Large</option>
                        </select>
                    </div>
                    <div class="product-options">
                        <label>Quantity:</label>
                        <input type="number" id="product-qty" value="1" min="1" max="10">
                    </div>
                    <button class="btn-add btn-large" onclick="addToCartFromDetail()">Add to Cart</button>
                    <button class="btn btn-secondary" onclick="window.location='shop.html'">Continue Shopping</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="copyright">© 2026 AN Fashion Villa. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
