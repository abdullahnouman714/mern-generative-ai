<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN Fashion Villa - Cart</title>
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">AN Fashion Villa</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html" class="active">Cart <span id="cart-count">0</span></a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </div>
        </nav>
    </header>

    <section class="cart-section">
        <div class="container">
            <h2>Your Shopping Cart</h2>
            <div class="cart-container">
                <div class="cart-items" id="cart-items"></div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row"><span>Subtotal:</span><span id="subtotal">PKR 0</span></div>
                    <div class="summary-row"><span>Shipping:</span><span id="shipping">PKR 150</span></div>
                    <div class="summary-row total"><span>Total:</span><span id="total">PKR 150</span></div>
                    <a href="checkout.html" class="btn btn-large">Proceed to Checkout</a>
                    <button class="btn btn-secondary" onclick="window.location='shop.html'">Continue Shopping</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="copyright">© 2026 AN Fashion Villa. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
